language = "C"
include_guard = "PLUGIN_HOST_H"
cpp_compat = true
documentation = true
style = "type"
header = """/*
 * plugin-host.h - C interface to the tmux plugin host (Rust staticlib).
 *
 * GENERATED by cbindgen from plugin-host/host; do not edit by hand.
 * Regenerate from plugin-host/host with:
 *     cbindgen --crate plugin-host --output ../include/plugin-host.h
 *
 * Threading contract:
 *  - All pgh_* functions are main-thread only.
 *  - Vtable callbacks are invoked only synchronously from inside pgh_* calls.
 *  - Vtable callbacks may re-enter pgh_notify (enqueue-only), nothing else.
 */"""

[export]
include = ["pgh_host_vtable"]

[fn]
sort_by = "None"
